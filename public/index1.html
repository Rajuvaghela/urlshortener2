<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>

        <form action="/" method="post">
            <div>
                <label for="url">URL</label>
                <input type="url" placeholder="Please enter URL" name="url" required>
            </div>

            <div>
                <label for="shortCode">Short Code</label>
                <input type="text" placeholder="Optional custom short code" name="shortCode">
            </div>

            <input type="submit" value="Submit">
        </form>

        <h2>Shortened URLs</h2>
        <ul>
            {{shortened_urls}}
        </ul>
    </div>
</body>
</html>
